<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskForge </title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
 :root {
  --bg: #111214;
  --surface: #18191c;
  --surface2: #1f2024;
  --surface3: #26272c;

  --border: #2f3136;

  --text: #e4e6eb;
  --text-muted: #9ca3af;
  --text-dim: #6b7280;

  /* single strong accent (no rainbow) */
  --accent: #4f46e5;

  /* subtle supporting tones (not flashy) */
  --accent2: #ef4444;  /* for errors / overdue */
  --accent3: #22c55e;  /* success */
  --accent4: #f59e0b;  /* warning */
  --accent5: #3b82f6;  /* info */

  --accent-glow: rgba(79, 70, 229, 0.15);

  --shadow: 0 6px 18px rgba(0,0,0,0.4);

  --radius: 10px;
  --radius-sm: 6px;

  --font-display: system-ui, -apple-system, sans-serif;
  --font-mono: ui-monospace, monospace;

  --transition: 0.15s ease;
}
  [data-theme="light"] {
    --bg: #f0f0f8;
    --surface: #ffffff;
    --surface2: #f7f7ff;
    --surface3: #ededff;
    --border: #ddddf0;
    --text: #111120;
    --text-muted: #7070a0;
    --text-dim: #c0c0e0;
    --accent: #6646f0;
    --accent-glow: rgba(100,70,240,0.15);
    --shadow: 0 8px 32px rgba(0,0,0,0.08);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-display);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 60px;
    transition: background 0.3s, color 0.3s;
    overflow-x: hidden;
  }

  
  body::before {
    content: '';
    position: fixed;
    top: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app { max-width: 820px; margin: 0 auto; position: relative; z-index: 1; }
  
  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 36px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    display: flex; flex-direction: column; gap: 2px;
  }
  .logo-title {
    font-size: 28px; font-weight: 800; letter-spacing: -1px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .logo-sub {
    font-family: var(--font-mono); font-size: 11px;
    color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase;
  }
  .header-actions { display: flex; gap: 10px; align-items: center; }

  .btn-icon {
    width: 40px; height: 40px; border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    transition: var(--transition);
  }
  .btn-icon:hover { border-color: var(--accent); color: var(--accent); transform: scale(1.08); }

  .stats-bar {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 12px; margin-bottom: 28px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex; flex-direction: column; gap: 4px;
    transition: var(--transition);
  }
  .stat-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .stat-label { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); letter-spacing: 1.5px; text-transform: uppercase; }
  .stat-value { font-size: 26px; font-weight: 800; }
  .s-total { color: var(--accent); }
  .s-active { color: var(--accent2); }
  .s-done { color: var(--accent3); }
  .s-overdue { color: var(--accent4); }

  /* ---- ADD TASK ---- */
  .add-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
  }
  .add-title {
    font-size: 13px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text-muted); margin-bottom: 14px;
  }
  .add-row { display: flex; gap: 10px; align-items: stretch; flex-wrap: wrap; }
  .input-field {
    flex: 1; min-width: 180px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--font-display);
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: var(--transition);
  }
  .input-field:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .input-field::placeholder { color: var(--text-muted); }
  select.input-field { cursor: pointer; }
  input[type="date"].input-field { cursor: pointer; color-scheme: dark; }
  [data-theme="light"] input[type="date"].input-field { color-scheme: light; }

  .add-row-2 { display: flex; gap: 10px; align-items: stretch; flex-wrap: wrap; margin-top: 10px; }

  .priority-select { width: 130px; flex: none; }

  .btn-add {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: var(--radius-sm);
    color: #fff; font-family: var(--font-display);
    font-size: 14px; font-weight: 700;
    padding: 10px 22px; cursor: pointer;
    transition: var(--transition);
    white-space: nowrap;
  }
  .btn-add:hover { opacity: 0.88; transform: scale(1.03); }
  .btn-add:active { transform: scale(0.98); }

  /* ---- FILTERS ---- */
  .filters-row {
    display: flex; gap: 8px; align-items: center;
    margin-bottom: 20px; flex-wrap: wrap;
  }
  .filter-label { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); letter-spacing: 1px; margin-right: 4px; }
  .filter-btn {
    padding: 6px 14px; border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent; color: var(--text-muted);
    font-family: var(--font-display); font-size: 13px; font-weight: 600;
    cursor: pointer; transition: var(--transition);
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--accent); border-color: var(--accent); color: #fff;
  }
  .search-wrap { margin-left: auto; position: relative; }
  .search-input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text);
    font-family: var(--font-display); font-size: 13px;
    padding: 6px 14px 6px 34px;
    outline: none; width: 180px;
    transition: var(--transition);
  }
  .search-input:focus { border-color: var(--accent); width: 220px; }
  .search-icon {
    position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); font-size: 14px; pointer-events: none;
  }

  /* ---- CATEGORIES ROW ---- */
  .cat-row {
    display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .cat-pill {
    padding: 5px 14px; border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent; color: var(--text-muted);
    font-family: var(--font-mono); font-size: 12px; font-weight: 500;
    cursor: pointer; transition: var(--transition);
    display: flex; align-items: center; gap: 6px;
  }
  .cat-pill .dot { width: 7px; height: 7px; border-radius: 50%; }
  .cat-pill:hover, .cat-pill.active { color: #fff; }
  .cat-work { --cat-color: #5cbffc; }
  .cat-study { --cat-color: var(--accent); }
  .cat-personal { --cat-color: var(--accent3); }
  .cat-health { --cat-color: var(--accent2); }
  .cat-finance { --cat-color: var(--accent4); }
  .cat-other { --cat-color: #a0a0c0; }
  .cat-pill.active, .cat-pill:hover { border-color: var(--cat-color); background: var(--cat-color); color: #fff; }
  .cat-pill .dot { background: var(--cat-color); }
  .cat-pill.active .dot, .cat-pill:hover .dot { background: rgba(255,255,255,0.8); }

  /* ---- TASK LIST ---- */
  .list-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .list-title { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }
  .sort-select {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text-muted);
    font-family: var(--font-mono); font-size: 11px; padding: 4px 8px;
    cursor: pointer; outline: none;
  }

  .task-list { display: flex; flex-direction: column; gap: 8px; min-height: 60px; }

  /* ---- TASK CARD ---- */
  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex; align-items: flex-start; gap: 12px;
    cursor: grab;
    transition: var(--transition);
    position: relative; overflow: hidden;
    animation: slideIn 0.25s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-10px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .task-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    border-radius: 3px 0 0 3px;
  }
  .task-card.priority-high::before  { background: var(--accent2); }
  .task-card.priority-med::before   { background: var(--accent4); }
  .task-card.priority-low::before   { background: var(--accent3); }
  .task-card.priority-none::before  { background: var(--border); }

  .task-card:hover { border-color: var(--accent); transform: translateX(3px); box-shadow: var(--shadow); }
  .task-card.dragging { opacity: 0.4; transform: scale(0.97); cursor: grabbing; }
  .task-card.drag-over { border-color: var(--accent); border-style: dashed; background: var(--surface2); }

  .task-card.done { opacity: 0.55; }
  .task-card.done .task-title { text-decoration: line-through; color: var(--text-muted); }

  .task-check {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px;
    transition: var(--transition);
    background: transparent;
  }
  .task-check:hover { border-color: var(--accent3); background: rgba(92,252,154,0.1); }
  .task-card.done .task-check { background: var(--accent3); border-color: var(--accent3); }
  .check-icon { color: #fff; font-size: 11px; display: none; }
  .task-card.done .check-icon { display: block; }

  .task-body { flex: 1; min-width: 0; }
  .task-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .task-title { font-size: 15px; font-weight: 600; line-height: 1.4; word-break: break-word; }
  .task-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; flex-wrap: wrap; }

  .task-cat {
    font-family: var(--font-mono); font-size: 10px;
    padding: 2px 8px; border-radius: 10px;
    font-weight: 500; letter-spacing: 0.5px;
  }
  .cat-work .task-cat   { background: rgba(92,191,252,0.15); color: #5cbffc; }
  .cat-study .task-cat  { background: rgba(124,92,252,0.15); color: var(--accent); }
  .cat-personal .task-cat { background: rgba(92,252,154,0.15); color: var(--accent3); }
  .cat-health .task-cat { background: rgba(252,92,125,0.15); color: var(--accent2); }
  .cat-finance .task-cat { background: rgba(252,185,92,0.15); color: var(--accent4); }
  .cat-other .task-cat  { background: rgba(160,160,192,0.15); color: #a0a0c0; }

  .task-due {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--text-muted); display: flex; align-items: center; gap: 4px;
  }
  .task-due.overdue { color: var(--accent2); }
  .task-due.soon { color: var(--accent4); }
  .task-due.ok { color: var(--accent3); }

  .priority-badge {
    font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px;
    text-transform: uppercase; padding: 2px 6px; border-radius: 4px; font-weight: 500;
  }
  .priority-high .priority-badge { background: rgba(252,92,125,0.15); color: var(--accent2); }
  .priority-med  .priority-badge { background: rgba(252,185,92,0.15); color: var(--accent4); }
  .priority-low  .priority-badge { background: rgba(92,252,154,0.15); color: var(--accent3); }
  .priority-none .priority-badge { display: none; }

  .task-actions { display: flex; gap: 4px; opacity: 0; transition: var(--transition); flex-shrink: 0; }
  .task-card:hover .task-actions { opacity: 1; }
  .task-btn {
    width: 28px; height: 28px; border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2); color: var(--text-muted);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 13px; transition: var(--transition);
  }
  .task-btn:hover { color: var(--text); border-color: var(--accent); }
  .task-btn.del:hover { color: var(--accent2); border-color: var(--accent2); }

  .drag-handle {
    color: var(--text-dim); cursor: grab; font-size: 14px;
    display: flex; align-items: center; padding: 2px 0;
    flex-shrink: 0; margin-top: 1px;
    transition: var(--transition);
  }
  .task-card:hover .drag-handle { color: var(--text-muted); }

  /* ---- EMPTY STATE ---- */
  .empty-state {
    text-align: center; padding: 48px 20px; color: var(--text-dim);
    display: none; flex-direction: column; align-items: center; gap: 12px;
  }
  .empty-state.show { display: flex; }
  .empty-icon { font-size: 40px; opacity: 0.4; }
  .empty-msg { font-size: 14px; font-weight: 600; }
  .empty-sub { font-family: var(--font-mono); font-size: 12px; }

  /* ---- REMINDER TOAST ---- */
  .toast-container {
    position: fixed; bottom: 24px; right: 24px;
    display: flex; flex-direction: column; gap: 8px; z-index: 1000;
  }
  .toast {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    padding: 14px 18px 14px 14px;
    display: flex; align-items: flex-start; gap: 10px;
    min-width: 280px; max-width: 340px;
    box-shadow: var(--shadow);
    animation: toastIn 0.3s ease;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(30px) scale(0.95); }
    to   { opacity: 1; transform: translateX(0) scale(1); }
  }
  .toast-icon { font-size: 20px; flex-shrink: 0; }
  .toast-content { flex: 1; }
  .toast-title { font-size: 13px; font-weight: 700; color: var(--accent); }
  .toast-msg { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .toast-close {
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; font-size: 14px; padding: 0; line-height: 1;
    transition: var(--transition);
  }
  .toast-close:hover { color: var(--accent2); }
  .toast.fadeout { animation: toastOut 0.3s ease forwards; }
  @keyframes toastOut {
    to { opacity: 0; transform: translateX(30px); }
  }

  /* ---- EDIT MODAL ---- */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    z-index: 500; opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px; width: 100%; max-width: 440px; margin: 16px;
    transform: scale(0.95); transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: scale(1); }
  .modal-title { font-size: 18px; font-weight: 800; margin-bottom: 20px; }
  .modal-field { margin-bottom: 14px; }
  .modal-label { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 6px; text-transform: uppercase; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
  .btn-cancel {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text-muted);
    font-family: var(--font-display); font-size: 14px; font-weight: 600;
    padding: 9px 18px; cursor: pointer; transition: var(--transition);
  }
  .btn-cancel:hover { color: var(--text); }
  .btn-save {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: var(--radius-sm);
    color: #fff; font-family: var(--font-display);
    font-size: 14px; font-weight: 700; padding: 9px 22px;
    cursor: pointer; transition: var(--transition);
  }
  .btn-save:hover { opacity: 0.88; }

  /* ---- PROGRESS BAR ---- */
  .progress-wrap { margin-bottom: 28px; }
  .progress-label {
    display: flex; justify-content: space-between;
    font-family: var(--font-mono); font-size: 11px; color: var(--text-muted);
    margin-bottom: 6px;
  }
  .progress-bar-bg {
    height: 4px; background: var(--surface2); border-radius: 4px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; border-radius: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  /* ---- CLEAR BTN ---- */
  .footer-actions { display: flex; justify-content: flex-end; margin-top: 16px; gap: 10px; }
  .btn-ghost {
    background: none; border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text-muted);
    font-family: var(--font-display); font-size: 12px; font-weight: 600;
    padding: 7px 14px; cursor: pointer; transition: var(--transition);
  }
  .btn-ghost:hover { border-color: var(--accent2); color: var(--accent2); }

  @media (max-width: 600px) {
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .add-row { flex-direction: column; }
    .search-input, .search-input:focus { width: 140px; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-title">TASK DUMP</div>
      <div class="logo-sub"></div>
    </div>
    <div class="header-actions">
      <button class="btn-icon" id="themeToggle" title="Toggle theme">🌙</button>
      <button class="btn-icon" id="exportBtn" title="Export tasks">⬇</button>
    </div>
  </header>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value s-total" id="statTotal">0</div></div>
    <div class="stat-card"><div class="stat-label">Active</div><div class="stat-value s-active" id="statActive">0</div></div>
    <div class="stat-card"><div class="stat-label">Done</div><div class="stat-value s-done" id="statDone">0</div></div>
    <div class="stat-card"><div class="stat-label">Overdue</div><div class="stat-value s-overdue" id="statOverdue">0</div></div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-wrap">
    <div class="progress-label">
      <span>Completion</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <!-- ADD TASK -->
  <div class="add-section">
    <div class="add-title">+ New Task</div>
    <div class="add-row">
      <input class="input-field" id="taskInput" type="text" placeholder="What needs to be done?">
    </div>
    <div class="add-row-2">
      <select class="input-field" id="catInput" style="width:130px;flex:none">
        <option value="work">💼 Work</option>
        <option value="study">📚 Study</option>
        <option value="personal">🏠 Personal</option>
        <option value="health">❤️ Health</option>
        <option value="finance">💰 Finance</option>
        <option value="other">🗂 Other</option>
      </select>
      <select class="input-field priority-select" id="priorityInput">
        <option value="none">No Priority</option>
        <option value="low">🟢 Low</option>
        <option value="med">🟡 Medium</option>
        <option value="high">🔴 High</option>
      </select>
      <input class="input-field" id="dateInput" type="date" style="width:160px;flex:none">
      <button class="btn-add" id="addBtn">Add Task ➕</button>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filters-row">
    <span class="filter-label">Filter:</span>
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="active">Active</button>
    <button class="filter-btn" data-filter="done">Done</button>
    <button class="filter-btn" data-filter="overdue">Overdue</button>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" type="text" placeholder="Search…">
    </div>
  </div>

  <!-- CATEGORIES -->
  <div class="cat-row">
    <button class="cat-pill cat-work active" data-cat="all"><span class="dot"></span>All</button>
    <button class="cat-pill cat-work" data-cat="work"><span class="dot"></span>Work</button>
    <button class="cat-pill cat-study" data-cat="study"><span class="dot"></span>Study</button>
    <button class="cat-pill cat-personal" data-cat="personal"><span class="dot"></span>Personal</button>
    <button class="cat-pill cat-health" data-cat="health"><span class="dot"></span>Health</button>
    <button class="cat-pill cat-finance" data-cat="finance"><span class="dot"></span>Finance</button>
    <button class="cat-pill cat-other" data-cat="other"><span class="dot"></span>Other</button>
  </div>

  <!-- LIST -->
  <div class="list-header">
    <div class="list-title" id="listTitle">All Tasks</div>
    <select class="sort-select" id="sortSelect">
      <option value="created">Sort: Added</option>
      <option value="due">Sort: Due Date</option>
      <option value="priority">Sort: Priority</option>
      <option value="alpha">Sort: A–Z</option>
    </select>
  </div>

  <div class="task-list" id="taskList"></div>
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">✅</div>
    <div class="empty-msg">Nothing here</div>
    <div class="empty-sub">Add a task or change your filters</div>
  </div>

  <div class="footer-actions">
    <button class="btn-ghost" id="clearDoneBtn">Clear Completed</button>
    <button class="btn-ghost" id="clearAllBtn">Clear All</button>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toastContainer"></div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-title">✏️ Edit Task</div>
    <div class="modal-field">
      <div class="modal-label">Task</div>
      <input class="input-field" id="editTaskInput" type="text" style="width:100%">
    </div>
    <div class="modal-field">
      <div class="modal-label">Category</div>
      <select class="input-field" id="editCatInput" style="width:100%">
        <option value="work">💼 Work</option>
        <option value="study">📚 Study</option>
        <option value="personal">🏠 Personal</option>
        <option value="health">❤️ Health</option>
        <option value="finance">💰 Finance</option>
        <option value="other">🗂 Other</option>
      </select>
    </div>
    <div class="modal-field">
      <div class="modal-label">Priority</div>
      <select class="input-field" id="editPriorityInput" style="width:100%">
        <option value="none">No Priority</option>
        <option value="low">🟢 Low</option>
        <option value="med">🟡 Medium</option>
        <option value="high">🔴 High</option>
      </select>
    </div>
    <div class="modal-field">
      <div class="modal-label">Due Date</div>
      <input class="input-field" id="editDateInput" type="date" style="width:100%">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="editCancel">Cancel</button>
      <button class="btn-save" id="editSave">Save Changes</button>
    </div>
  </div>
</div>

<script>
// ===== STATE =====
let tasks = JSON.parse(localStorage.getItem('taskforge_tasks') || '[]');
let filterStatus = 'all';
let filterCat = 'all';
let searchQuery = '';
let sortBy = 'created';
let editingId = null;
let dragSrcIndex = null;

const CAT_ICONS = { work:'💼', study:'📚', personal:'🏠', health:'❤️', finance:'💰', other:'🗂' };
const CAT_NAMES = { work:'Work', study:'Study', personal:'Personal', health:'Health', finance:'Finance', other:'Other' };
const PRIO_WEIGHT = { high:3, med:2, low:1, none:0 };

// ===== PERSISTENCE =====
function save() { localStorage.setItem('taskforge_tasks', JSON.stringify(tasks)); }

// ===== HELPERS =====
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function today() { return new Date().toISOString().split('T')[0]; }
function formatDate(d) {
  if (!d) return null;
  const parts = d.split('-');
  return `${parts[2]}/${parts[1]}/${parts[0]}`;
}
function getDueStatus(dueDate, done) {
  if (!dueDate || done) return 'none';
  const t = today();
  if (dueDate < t) return 'overdue';
  const diff = (new Date(dueDate) - new Date()) / 86400000;
  if (diff <= 2) return 'soon';
  return 'ok';
}
function getDueLabel(dueDate) {
  if (!dueDate) return '';
  const t = today();
  if (dueDate === t) return 'Today';
  const diff = Math.round((new Date(dueDate) - new Date(t)) / 86400000);
  if (diff === 1) return 'Tomorrow';
  if (diff === -1) return 'Yesterday';
  if (diff < 0) return `${Math.abs(diff)}d overdue`;
  return formatDate(dueDate);
}

// ===== FILTERING / SORTING =====
function getFiltered() {
  let list = [...tasks];
  if (filterStatus === 'active')  list = list.filter(t => !t.done);
  if (filterStatus === 'done')    list = list.filter(t => t.done);
  if (filterStatus === 'overdue') list = list.filter(t => !t.done && t.due && t.due < today());
  if (filterCat !== 'all')        list = list.filter(t => t.cat === filterCat);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(t => t.text.toLowerCase().includes(q));
  }
  // sort
  list.sort((a, b) => {
    if (sortBy === 'priority') return PRIO_WEIGHT[b.priority] - PRIO_WEIGHT[a.priority];
    if (sortBy === 'due') {
      if (!a.due && !b.due) return 0;
      if (!a.due) return 1; if (!b.due) return -1;
      return a.due < b.due ? -1 : 1;
    }
    if (sortBy === 'alpha') return a.text.localeCompare(b.text);
    return b.created - a.created; // default: newest
  });
  return list;
}

// ===== RENDER =====
function render() {
  const list = getFiltered();
  const listEl = document.getElementById('taskList');
  const emptyEl = document.getElementById('emptyState');
  listEl.innerHTML = '';

  // stats
  const total = tasks.length;
  const done = tasks.filter(t => t.done).length;
  const active = total - done;
  const overdue = tasks.filter(t => !t.done && t.due && t.due < today()).length;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statActive').textContent = active;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statOverdue').textContent = overdue;
  const pct = total ? Math.round((done/total)*100) : 0;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';

  if (!list.length) { emptyEl.classList.add('show'); return; }
  emptyEl.classList.remove('show');

  list.forEach((task, idx) => {
    const dueStatus = getDueStatus(task.due, task.done);
    const dueLabel  = getDueLabel(task.due);
    const card = document.createElement('div');
    card.className = `task-card cat-${task.cat} priority-${task.priority}${task.done?' done':''}`;
    card.draggable = true;
    card.dataset.id = task.id;
    card.innerHTML = `
      <div class="drag-handle" title="Drag to reorder">⠿</div>
      <div class="task-check" data-id="${task.id}" title="${task.done?'Mark active':'Mark done'}">
        <span class="check-icon">✓</span>
      </div>
      <div class="task-body">
        <div class="task-top">
          <div class="task-title">${escHtml(task.text)}</div>
          <div class="task-actions">
            <button class="task-btn edit-btn" data-id="${task.id}" title="Edit">✏</button>
            <button class="task-btn del task-del-btn" data-id="${task.id}" title="Delete">✕</button>
          </div>
        </div>
        <div class="task-meta">
          <span class="task-cat">${CAT_ICONS[task.cat]} ${CAT_NAMES[task.cat]}</span>
          ${task.priority!=='none'?`<span class="priority-badge">${task.priority}</span>`:''}
          ${dueLabel?`<span class="task-due ${dueStatus}">📅 ${dueLabel}</span>`:''}
        </div>
      </div>`;
    listEl.appendChild(card);

    // drag events
    card.addEventListener('dragstart', e => { dragSrcIndex = tasks.findIndex(t=>t.id===task.id); card.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
    card.addEventListener('dragend',   () => { card.classList.remove('dragging'); document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over')); });
    card.addEventListener('dragover',  e => { e.preventDefault(); e.dataTransfer.dropEffect='move'; card.classList.add('drag-over'); });
    card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
    card.addEventListener('drop', e => {
      e.preventDefault(); card.classList.remove('drag-over');
      const destId = task.id;
      const destIndex = tasks.findIndex(t=>t.id===destId);
      if (dragSrcIndex === null || dragSrcIndex === destIndex) return;
      const [moved] = tasks.splice(dragSrcIndex, 1);
      tasks.splice(destIndex, 0, moved);
      dragSrcIndex = null;
      save(); render();
    });
  });

  // delegate click events
  listEl.addEventListener('click', handleListClick, {once:true});
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function handleListClick(e) {
  // check toggle
  const check = e.target.closest('.task-check');
  if (check) { toggleDone(check.dataset.id); return; }
  // delete
  const del = e.target.closest('.task-del-btn');
  if (del) { deleteTask(del.dataset.id); return; }
  // edit
  const edit = e.target.closest('.edit-btn');
  if (edit) { openEdit(edit.dataset.id); return; }
}

// ===== ACTIONS =====
function addTask() {
  const text = document.getElementById('taskInput').value.trim();
  if (!text) { shake(document.getElementById('taskInput')); return; }
  const task = {
    id: genId(),
    text,
    cat: document.getElementById('catInput').value,
    priority: document.getElementById('priorityInput').value,
    due: document.getElementById('dateInput').value || null,
    done: false,
    created: Date.now()
  };
  tasks.unshift(task);
  document.getElementById('taskInput').value = '';
  document.getElementById('dateInput').value = '';
  document.getElementById('priorityInput').value = 'none';
  save(); render();
  showToast('✅', 'Task Added', task.text.length > 30 ? task.text.slice(0,30)+'…' : task.text);
  scheduleReminder(task);
}

function toggleDone(id) {
  const t = tasks.find(t=>t.id===id);
  if (!t) return;
  t.done = !t.done;
  save(); render();
  if (t.done) showToast('🎉', 'Task Completed!', t.text.length>30?t.text.slice(0,30)+'…':t.text);
}

function deleteTask(id) {
  tasks = tasks.filter(t=>t.id!==id);
  save(); render();
}

function shake(el) {
  el.style.animation='shake 0.3s';
  el.addEventListener('animationend',()=>el.style.animation='',{once:true});
}

// edit modal
function openEdit(id) {
  const t = tasks.find(t=>t.id===id);
  if (!t) return;
  editingId = id;
  document.getElementById('editTaskInput').value = t.text;
  document.getElementById('editCatInput').value = t.cat;
  document.getElementById('editPriorityInput').value = t.priority;
  document.getElementById('editDateInput').value = t.due || '';
  document.getElementById('editModal').classList.add('open');
}
function closeEdit() { document.getElementById('editModal').classList.remove('open'); editingId=null; }
function saveEdit() {
  if (!editingId) return;
  const t = tasks.find(t=>t.id===editingId);
  if (!t) return;
  const text = document.getElementById('editTaskInput').value.trim();
  if (!text) return;
  t.text = text;
  t.cat = document.getElementById('editCatInput').value;
  t.priority = document.getElementById('editPriorityInput').value;
  t.due = document.getElementById('editDateInput').value || null;
  closeEdit(); save(); render();
  showToast('✏️','Task Updated', text.length>30?text.slice(0,30)+'…':text);
  scheduleReminder(t);
}

// ===== TOAST =====
function showToast(icon, title, msg, duration=3500) {
  const c = document.getElementById('toastContainer');
  const div = document.createElement('div');
  div.className = 'toast';
  div.innerHTML = `<div class="toast-icon">${icon}</div><div class="toast-content"><div class="toast-title">${title}</div><div class="toast-msg">${msg}</div></div><button class="toast-close">✕</button>`;
  div.querySelector('.toast-close').addEventListener('click', ()=>removeToast(div));
  c.appendChild(div);
  setTimeout(()=>removeToast(div), duration);
}
function removeToast(div) {
  div.classList.add('fadeout');
  div.addEventListener('animationend', ()=>div.remove(), {once:true});
}

// ===== REMINDERS =====
function scheduleReminder(task) {
  if (!task.due || task.done) return;
  const due = new Date(task.due);
  const now = new Date();
  const diff = due - now;
  // remind 1 day before
  const remindMs = diff - 86400000;
  if (remindMs > 0 && remindMs < 7 * 86400000) {
    setTimeout(() => {
      const t = tasks.find(t=>t.id===task.id);
      if (t && !t.done) showToast('⏰','Reminder', `"${t.text}" is due tomorrow!`, 7000);
    }, remindMs);
  }
  // overdue check on open
}
function checkOverdueOnLoad() {
  const overdue = tasks.filter(t=>!t.done && t.due && t.due < today());
  if (overdue.length) {
    setTimeout(()=>showToast('⚠️','Overdue Tasks', `You have ${overdue.length} overdue task${overdue.length>1?'s':''}!`, 5000), 1000);
  }
}

// ===== THEME =====
let isDark = localStorage.getItem('taskforge_theme') !== 'light';
function applyTheme() {
  document.documentElement.setAttribute('data-theme', isDark?'dark':'light');
  document.getElementById('themeToggle').textContent = isDark?'🌙':'☀️';
  localStorage.setItem('taskforge_theme', isDark?'dark':'light');
}
applyTheme();
document.getElementById('themeToggle').addEventListener('click', ()=>{ isDark=!isDark; applyTheme(); });

// ===== EXPORT =====
document.getElementById('exportBtn').addEventListener('click', ()=>{
  const data = JSON.stringify(tasks, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `taskforge_${today()}.json`;
  a.click();
  showToast('⬇','Exported!',`${tasks.length} tasks saved as JSON`);
});

// ===== FILTER BUTTONS =====
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    filterStatus = btn.dataset.filter;
    render();
  });
});

// ===== CATEGORY PILLS =====
document.querySelectorAll('.cat-pill').forEach(pill=>{
  pill.addEventListener('click', ()=>{
    document.querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('active'));
    pill.classList.add('active');
    filterCat = pill.dataset.cat;
    render();
  });
});

// ===== SEARCH =====
document.getElementById('searchInput').addEventListener('input', e=>{
  searchQuery = e.target.value;
  render();
});

// ===== SORT =====
document.getElementById('sortSelect').addEventListener('change', e=>{
  sortBy = e.target.value;
  render();
});

// ===== ADD =====
document.getElementById('addBtn').addEventListener('click', addTask);
document.getElementById('taskInput').addEventListener('keydown', e=>{ if(e.key==='Enter') addTask(); });

// ===== CLEAR =====
document.getElementById('clearDoneBtn').addEventListener('click', ()=>{
  const count = tasks.filter(t=>t.done).length;
  tasks = tasks.filter(t=>!t.done);
  save(); render();
  if (count) showToast('🗑','Cleared',`${count} completed task${count>1?'s':''} removed`);
});
document.getElementById('clearAllBtn').addEventListener('click', ()=>{
  if (!tasks.length) return;
  if (confirm('Clear ALL tasks? This cannot be undone.')) {
    tasks = []; save(); render();
    showToast('🗑','All Cleared','Your task list is empty');
  }
});

// ===== EDIT MODAL =====
document.getElementById('editCancel').addEventListener('click', closeEdit);
document.getElementById('editSave').addEventListener('click', saveEdit);
document.getElementById('editModal').addEventListener('click', e=>{ if(e.target===document.getElementById('editModal')) closeEdit(); });
document.getElementById('editTaskInput').addEventListener('keydown', e=>{ if(e.key==='Enter') saveEdit(); });

// ===== SHAKE KEYFRAME =====
const style = document.createElement('style');
style.textContent = `@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }`;
document.head.appendChild(style);

// ===== INIT =====
render();
checkOverdueOnLoad();
</script>
</body>
</html>
